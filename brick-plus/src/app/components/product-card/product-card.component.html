<div class="product-card" (click)="onCardClick()">
  <div class="card-header">
    <span class="card-title">{{ product.title }}</span>
    <app-favorite
      [isFavorite]="product.isFavorite"
      (favorite)="onFavoriteChange($event)"
    ></app-favorite>
  </div>

  <div class="card-img-top">
    <div class="card-img-wrapper">
      <img
        class="card-img"
        [src]="product.image"
        [alt]="product.title"
      />
      <span class="card-badge">{{ product.badge }}</span>
    </div>
  </div>

  <div class="card-bottom">
    <div class="card-desc">{{ product.description }}</div>
    <div class="card-prices">
      <span class="card-price-ht">{{ product.priceHT }}€</span>
      <span class="card-price-ttc">{{ product.priceTTC }}€ TTC</span>
    </div>
    <button class="card-btn" (click)="addToCart()">
      Ajouter au panier
    </button>
  </div>
</div>
