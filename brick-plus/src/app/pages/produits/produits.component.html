<div class="catalogue-page">
  <app-header></app-header>

  <div class="catalogue-container">
    <!-- En-tête -->
    <div class="catalogue-header">
      <button class="back-btn" (click)="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>CATALOGUE</h1>
    </div>

    <!-- Barre de recherche et filtres -->
    <app-search-filter-bar
      searchPlaceholder="Rechercher"
      (allFiltersChange)="onFiltersChange($event)"
    ></app-search-filter-bar>

    <!-- Chargement -->
    <div *ngIf="isLoading" class="loading">
      <div class="spinner"></div>
      <p>Chargement des produits...</p>
    </div>

    <!-- Erreur -->
    <div *ngIf="errorMessage" class="error">
      <p>{{ errorMessage }}</p>
    </div>

    <!-- Grille de produits -->
    <div *ngIf="!isLoading && !errorMessage" class="products-grid">
      <app-product-card
        *ngFor="let product of products"
        [product]="product"
        (favoriteToggled)="toggleFavorite($event)"
        (addedToCart)="addToCart($event)"
      ></app-product-card>
    </div>

    <!-- Aucun résultat -->
    <div *ngIf="!isLoading && !errorMessage && products.length === 0" class="no-results">
      <p>Aucun produit trouvé</p>
    </div>

    <!-- Pagination -->
    <div *ngIf="!isLoading && products.length > 0" class="pagination">
      <button
        class="pagination-btn"
        [disabled]="currentPage === 1"
        (click)="changePage(currentPage - 1)"
      >
        Précédent
      </button>

      <div class="pagination-numbers">
        <button
          *ngFor="let page of getPageNumbers()"
          class="page-number"
          [class.active]="currentPage === page"
          (click)="changePage(page)"
        >
          {{ page }}
        </button>
      </div>

      <button
        class="pagination-btn"
        [disabled]="currentPage === totalPages"
        (click)="changePage(currentPage + 1)"
      >
        Suivant
      </button>
    </div>
  </div>

  <app-footer></app-footer>
</div>
