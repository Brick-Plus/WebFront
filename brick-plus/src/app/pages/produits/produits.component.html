<div class="catalogue-page">
  <app-header></app-header>

  <div class="catalogue-container">
    <!-- En-tête -->
    <div class="catalogue-header">
      <button class="back-btn" (click)="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>CATALOGUE</h1>
    </div>

    <!-- Barre de recherche et filtres -->
    <app-search-filter-bar
      searchPlaceholder="Rechercher"
      (allFiltersChange)="onFiltersChange($event)"
    ></app-search-filter-bar>

    <!-- Chargement -->
    <div *ngIf="isLoading" class="loading">
      <div class="spinner"></div>
      <p>Chargement des produits...</p>
    </div>

    <!-- Erreur -->
    <div *ngIf="errorMessage" class="error">
      <p>{{ errorMessage }}</p>
    </div>

    <!-- Grille de produits -->
    <div *ngIf="!isLoading && !errorMessage" class="products-grid">
      <div *ngFor="let product of products" class="product-card">
        
        <!-- Header avec titre et favori -->
        <div class="card-header">
          <h3>Titre</h3>
          <button 
            class="favorite-btn" 
            [class.active]="product.isFavorite"
            (click)="toggleFavorite(product, $event)"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" 
                 [attr.fill]="product.isFavorite ? 'currentColor' : 'none'" 
                 stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </button>
        </div>

        <!-- Image du produit avec badge -->
        <div class="product-image">
          <span class="badge-new">Nouveauté</span>
          <img [src]="product.image" [alt]="product.title" loading="lazy">
        </div>

        <!-- Infos -->
        <div class="product-info">
          <p class="description">Description</p>
          <p class="price">Prix € - Prix € TTC</p>
        </div>

        <!-- Bouton ajouter au panier -->
        <button class="add-to-cart" (click)="addToCart(product)">
          Ajouter au panier
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Aucun résultat -->
    <div *ngIf="!isLoading && !errorMessage && products.length === 0" class="no-results">
      <p>Aucun produit trouvé</p>
    </div>

    <!-- Pagination -->
    <div *ngIf="!isLoading && products.length > 0" class="pagination">
      <button 
        class="pagination-btn"
        [disabled]="currentPage === 1"
        (click)="changePage(currentPage - 1)"
      >
        Précédent
      </button>

      <div class="pagination-numbers">
        <button 
          *ngFor="let page of getPageNumbers()"
          class="page-number"
          [class.active]="currentPage === page"
          (click)="changePage(page)"
        >
          {{ page }}
        </button>
      </div>

      <button 
        class="pagination-btn"
        [disabled]="currentPage === totalPages"
        (click)="changePage(currentPage + 1)"
      >
        Suivant
      </button>
    </div>
  </div>
</div>
