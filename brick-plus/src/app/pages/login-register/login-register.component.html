<div class="login">

  <!-- Back Button (Top Left) -->
  <a class="login__top-back-btn" routerLink="/home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Retour
  </a>

  <!-- Header -->
  <div class="login__header">

    <h1 class="login__title">
      Se connecter
    </h1>

  </div>

  <!-- Card -->
  <div class="login__card">

    <form
      [formGroup]="loginForm"
      (ngSubmit)="submit()"
      novalidate
      ngNativeValidate="false"
    >

      <!-- Google -->
      <button
        type="button"
        class="login__google-btn"
        (click)="continueWithGoogle()"
      >
        <img
          src="/icons/google.svg"
          alt="Google"
          class="login__google-icon"
        />
        Continuer avec Google
      </button>

      <!-- Divider -->
      <div class="login__divider">
        OU
      </div>

      <!-- Email -->
      <div class="login__input-group">

        <input
          type="email"
          class="login__input"
          placeholder="Saisissez votre e-mail"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
        />

        @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
          <div class="login__error">
            Veuillez entrer un email valide
          </div>
        }

      </div>

      <!-- Password -->
      <div class="login__input-group">

        <div class="login__password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="login__input"
            placeholder="Saisissez votre mot de passe"
            formControlName="password"
            autocomplete="current-password"
          />

          <button
            type="button"
            class="login__password-toggle"
            (click)="togglePasswordVisibility()"
            tabindex="-1"
          >
            @if (showPassword) {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            }
          </button>
        </div>

        @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
          <div class="login__error">
            Au moins 10 caractères sont attendu
          </div>
        }

      </div>

      <!-- Forgot Password Link -->
      <button
        type="button"
        class="login__forgot-password-btn"
        (click)="forgotPassword()"
      >
        Mot de passe oublié ?
      </button>

      <!-- Submit -->
      <button
        type="submit"
        class="login__submit-btn"
      >
        Se connecter
      </button>
    </form>
  </div>
  <!-- Sign Up Link -->
      <p class="login__signup">
        Pas encore de compte ?
        <a routerLink="/register" class="login__signup-link">
          Créer un compte
        </a>
      </p>
</div>
