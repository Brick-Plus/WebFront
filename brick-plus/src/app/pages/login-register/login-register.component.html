<div class="login-main-content">

  <!-- Header -->
  <div class="login-header">

    <button class="back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>

    <h1 class="login-title">
      Se connecter
    </h1>

  </div>

  <!-- Card -->
  <div class="frame-14_141-2174">

    <form
      [formGroup]="loginForm"
      (ngSubmit)="continueWithEmail()"
      novalidate
      ngNativeValidate="false"
    >

      <!-- Google -->
      <button
        type="button"
        class="boutton_196-964"
        (click)="continueWithGoogle()"
      >
        Continuer avec Google
      </button>

      <!-- Divider -->
      <div class="login-divider">
        OU
      </div>

      <!-- Email -->
      <div class="frame-6_141-2150">

        <input
          type="email"
          class="imput_162-1946"
          placeholder="Saisissez votre e-mail"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
        />

        @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
          <div class="error-message">
            Veuillez entrer un email valide
          </div>
        }

      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="boutton_141-1002"
      >
        Continuer avec l'e-mail
      </button>

    </form>

  </div>

</div>
