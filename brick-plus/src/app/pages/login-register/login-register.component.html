<div class="login">

  <!-- Header -->
  <div class="login__header">

    <button class="login__back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>

    <h1 class="login__title">
      Se connecter
    </h1>

  </div>

  <!-- Card -->
  <div class="login__card">

    <form
      [formGroup]="loginForm"
      (ngSubmit)="continueWithEmail()"
      novalidate
      ngNativeValidate="false"
    >

      <!-- Google -->
      <button
        type="button"
        class="login__google-btn"
        (click)="continueWithGoogle()"
      >
        <img
          src="/icons/google.svg"
          alt="Google"
          class="login__google-icon"
        />
        Continuer avec Google
      </button>

      <!-- Divider -->
      <div class="login__divider">
        OU
      </div>

      <!-- Email -->
      <div class="login__input-group">

        <input
          type="email"
          class="login__input"
          placeholder="Saisissez votre e-mail"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
        />

        @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
          <div class="login__error">
            Veuillez entrer un email valide
          </div>
        }

      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="login__submit-btn"
      >
        Continuer avec l'e-mail
      </button>

      <!-- Privacy -->
      <p class="login__privacy">
        En continuant, vous reconnaissez la
        <a href="/privacy-policy" class="login__privacy-link">
          Politique de confidentialité
        </a>
        de Brick+.
      </p>
    </form>
  </div>
</div>
