<div class="lego-sets-wrapper">
  <app-header></app-header>

  <div class="cards-container">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (favoriteToggled)="toggleFavorite($event)"
      (addedToCart)="addToCart($event)"
    ></app-product-card>
  </div>

  <app-footer></app-footer>
</div>
